<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Coming Soon — Premier Roofing</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --orange: #f97316;
      --dark:   #0f172a;
      --slate:  #1e293b;
      --light:  #f8fafc;
    }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--dark);
      color: var(--light);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── Sky + animated clouds ── */
    .sky {
      position: fixed; inset: 0;
      background: linear-gradient(180deg, #0f172a 0%, #1e3a5f 55%, #f97316 100%);
      z-index: 0;
    }

    .cloud {
      position: absolute;
      background: rgba(255,255,255,0.06);
      border-radius: 50px;
      filter: blur(18px);
      animation: drift linear infinite;
    }
    .cloud:nth-child(1) { width:320px; height:80px;  top:12%; animation-duration:28s; animation-delay:-6s;  }
    .cloud:nth-child(2) { width:200px; height:55px;  top:25%; animation-duration:22s; animation-delay:-13s; }
    .cloud:nth-child(3) { width:260px; height:65px;  top:38%; animation-duration:35s; animation-delay:-2s;  }
    .cloud:nth-child(4) { width:180px; height:45px;  top:8%;  animation-duration:18s; animation-delay:-9s;  }

    @keyframes drift {
      from { transform: translateX(-400px); }
      to   { transform: translateX(110vw);  }
    }

    /* ── Stars ── */
    .stars {
      position: fixed; inset: 0; z-index: 0;
      pointer-events: none;
    }
    .star {
      position: absolute;
      width: 2px; height: 2px;
      background: #fff;
      border-radius: 50%;
      animation: twinkle ease-in-out infinite;
    }
    @keyframes twinkle {
      0%,100% { opacity: 0.1; transform: scale(1);   }
      50%      { opacity: 0.9; transform: scale(1.4); }
    }

    /* ── Roof silhouette ── */
    .roofline {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: 220px;
      z-index: 1;
    }
    .roofline svg { width: 100%; height: 100%; }

    /* ── Animated hammer ── */
    .hammer-wrap {
      position: fixed;
      bottom: 190px;
      right: 8%;
      z-index: 3;
      transform-origin: bottom right;
      animation: hammerSwing 1.2s ease-in-out infinite;
    }
    @keyframes hammerSwing {
      0%,100% { transform: rotate(-30deg); }
      50%      { transform: rotate(15deg);  }
    }

    /* ── Content ── */
    .content {
      position: relative;
      z-index: 5;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem 1rem 240px;
      text-align: center;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: .5rem;
      background: rgba(249,115,22,.15);
      border: 1px solid rgba(249,115,22,.4);
      color: var(--orange);
      border-radius: 999px;
      padding: .35rem 1rem;
      font-size: .8rem;
      font-weight: 600;
      letter-spacing: .08em;
      text-transform: uppercase;
      margin-bottom: 1.5rem;
      animation: fadeSlideDown .7s ease both;
    }
    .badge-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--orange);
      animation: pulse 1.4s ease-in-out infinite;
    }
    @keyframes pulse {
      0%,100% { box-shadow: 0 0 0 0 rgba(249,115,22,.7); }
      50%      { box-shadow: 0 0 0 6px rgba(249,115,22,0); }
    }

    h1 {
      font-size: clamp(2.4rem, 7vw, 5.5rem);
      font-weight: 800;
      line-height: 1.05;
      letter-spacing: -.02em;
      animation: fadeSlideDown .7s .15s ease both;
    }
    h1 span { color: var(--orange); }

    .tagline {
      margin-top: 1rem;
      font-size: clamp(1rem, 2.5vw, 1.35rem);
      color: #94a3b8;
      max-width: 520px;
      animation: fadeSlideDown .7s .3s ease both;
    }

    /* ── Countdown ── */
    .countdown {
      display: flex;
      gap: 1.2rem;
      margin: 2.5rem 0;
      animation: fadeSlideDown .7s .45s ease both;
    }
    .cd-block {
      display: flex;
      flex-direction: column;
      align-items: center;
      background: rgba(255,255,255,.05);
      border: 1px solid rgba(255,255,255,.1);
      border-radius: 14px;
      padding: 1rem 1.4rem;
      min-width: 80px;
      backdrop-filter: blur(6px);
    }
    .cd-num {
      font-size: 2.6rem;
      font-weight: 800;
      color: var(--orange);
      line-height: 1;
      font-variant-numeric: tabular-nums;
    }
    .cd-label {
      font-size: .65rem;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: #64748b;
      margin-top: .3rem;
    }

    /* ── Email form ── */
    .notify-form {
      display: flex;
      gap: .5rem;
      flex-wrap: wrap;
      justify-content: center;
      width: 100%;
      max-width: 460px;
      animation: fadeSlideDown .7s .6s ease both;
    }
    .notify-form input {
      flex: 1;
      min-width: 220px;
      padding: .85rem 1.2rem;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,.15);
      background: rgba(255,255,255,.07);
      color: #fff;
      font-size: 1rem;
      outline: none;
      transition: border-color .2s;
    }
    .notify-form input::placeholder { color: #64748b; }
    .notify-form input:focus { border-color: var(--orange); }

    .notify-form button {
      padding: .85rem 1.6rem;
      border-radius: 10px;
      border: none;
      background: var(--orange);
      color: #fff;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: background .2s, transform .15s;
      white-space: nowrap;
    }
    .notify-form button:hover  { background: #ea6c0a; transform: translateY(-1px); }
    .notify-form button:active { transform: translateY(0); }

    .success-msg {
      display: none;
      color: #4ade80;
      font-weight: 600;
      margin-top: .8rem;
      animation: fadeSlideDown .4s ease both;
    }

    /* ── Progress bar ── */
    .progress-wrap {
      width: 100%;
      max-width: 420px;
      margin-top: 2rem;
      animation: fadeSlideDown .7s .75s ease both;
    }
    .progress-meta {
      display: flex;
      justify-content: space-between;
      font-size: .8rem;
      color: #64748b;
      margin-bottom: .5rem;
    }
    .progress-track {
      height: 6px;
      background: rgba(255,255,255,.08);
      border-radius: 999px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      width: 0;
      background: linear-gradient(90deg, var(--orange), #fbbf24);
      border-radius: 999px;
      transition: width 1.8s cubic-bezier(.4,0,.2,1);
    }

    /* ── Sparks ── */
    .sparks { position: fixed; inset: 0; pointer-events: none; z-index: 2; }
    .spark {
      position: absolute;
      width: 4px; height: 4px;
      border-radius: 50%;
      background: var(--orange);
      opacity: 0;
      animation: sparkFly var(--dur, 2s) var(--delay, 0s) ease-in infinite;
    }
    @keyframes sparkFly {
      0%   { transform: translate(0,0) scale(1);   opacity: 1; }
      100% { transform: translate(var(--tx,20px), var(--ty,-80px)) scale(0); opacity: 0; }
    }

    @keyframes fadeSlideDown {
      from { opacity: 0; transform: translateY(-18px); }
      to   { opacity: 1; transform: translateY(0);     }
    }

    /* ── Responsive ── */
    @media (max-width: 480px) {
      .cd-block { padding: .7rem .9rem; min-width: 62px; }
      .cd-num { font-size: 2rem; }
      .hammer-wrap { right: 2%; }
    }
  </style>
</head>
<body>

<!-- Sky -->
<div class="sky">
  <div class="cloud"></div>
  <div class="cloud"></div>
  <div class="cloud"></div>
  <div class="cloud"></div>
</div>

<!-- Stars -->
<div class="stars" id="stars"></div>

<!-- Sparks -->
<div class="sparks" id="sparks"></div>

<!-- Animated hammer (SVG) -->
<div class="hammer-wrap">
  <svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
    <rect x="28" y="28" width="10" height="30" rx="3" fill="#94a3b8"/>
    <rect x="10" y="10" width="36" height="22" rx="5" fill="#f97316"/>
    <rect x="10" y="10" width="14" height="22" rx="4" fill="#ea6c0a"/>
  </svg>
</div>

<!-- Roofline silhouette -->
<div class="roofline">
  <svg viewBox="0 0 1440 220" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
    <!-- sky glow behind roof -->
    <defs>
      <linearGradient id="roofGrad" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#1e293b"/>
        <stop offset="100%" stop-color="#0f172a"/>
      </linearGradient>
    </defs>
    <!-- Main house -->
    <polygon points="520,180 720,40 920,180" fill="#1e293b" stroke="#334155" stroke-width="2"/>
    <rect x="520" y="178" width="400" height="42" fill="#1e293b"/>
    <!-- Chimney -->
    <rect x="810" y="80" width="30" height="70" fill="#0f172a" stroke="#334155" stroke-width="1.5"/>
    <!-- Door -->
    <rect x="690" y="130" width="60" height="90" rx="4" fill="#0f172a"/>
    <!-- Windows -->
    <rect x="575" y="115" width="50" height="45" rx="3" fill="#0f172a" stroke="#334155" stroke-width="1.5"/>
    <rect x="575" y="115" width="50" height="2" fill="#334155"/>
    <rect x="600" y="115" width="2" height="45" fill="#334155"/>
    <rect x="875" y="115" width="50" height="45" rx="3" fill="#0f172a" stroke="#334155" stroke-width="1.5"/>
    <rect x="875" y="115" width="50" height="2" fill="#334155"/>
    <rect x="900" y="115" width="2" height="45" fill="#334155"/>
    <!-- Left smaller house -->
    <polygon points="100,210 280,100 460,210" fill="#162032" stroke="#334155" stroke-width="1.5"/>
    <rect x="100" y="208" width="360" height="12" fill="#162032"/>
    <!-- Right smaller house -->
    <polygon points="980,210 1160,105 1340,210" fill="#162032" stroke="#334155" stroke-width="1.5"/>
    <rect x="980" y="208" width="360" height="12" fill="#162032"/>
    <!-- Ground -->
    <rect x="0" y="210" width="1440" height="10" fill="#0f172a"/>
    <!-- Shingle lines on main roof -->
    <line x1="620" y1="130" x2="680" y2="80"  stroke="#334155" stroke-width="1" opacity=".6"/>
    <line x1="660" y1="150" x2="720" y2="90"  stroke="#334155" stroke-width="1" opacity=".6"/>
    <line x1="700" y1="165" x2="760" y2="100" stroke="#334155" stroke-width="1" opacity=".6"/>
    <line x1="740" y1="155" x2="800" y2="100" stroke="#334155" stroke-width="1" opacity=".6"/>
    <line x1="780" y1="140" x2="840" y2="95"  stroke="#334155" stroke-width="1" opacity=".6"/>
    <line x1="820" y1="125" x2="860" y2="95"  stroke="#334155" stroke-width="1" opacity=".6"/>
  </svg>
</div>

<!-- Main content -->
<div class="content">
  <div class="badge">
    <span class="badge-dot"></span>
    Something big is being built
  </div>

  <h1>Your Roof.<br><span>Our Mission.</span></h1>
  <p class="tagline">We're putting the finishing touches on our new site. Quality craftsmanship takes time — we'll be ready soon.</p>

  <div class="countdown">
    <div class="cd-block"><span class="cd-num" id="cd-days">00</span><span class="cd-label">Days</span></div>
    <div class="cd-block"><span class="cd-num" id="cd-hrs">00</span><span class="cd-label">Hours</span></div>
    <div class="cd-block"><span class="cd-num" id="cd-min">00</span><span class="cd-label">Minutes</span></div>
    <div class="cd-block"><span class="cd-num" id="cd-sec">00</span><span class="cd-label">Seconds</span></div>
  </div>

  <form class="notify-form" onsubmit="handleSubmit(event)">
    <input type="email" placeholder="Enter your email for early access" required id="emailInput"/>
    <button type="submit">Notify Me</button>
  </form>
  <p class="success-msg" id="successMsg">🎉 You're on the list! We'll be in touch.</p>

  <div class="progress-wrap">
    <div class="progress-meta">
      <span>Site Progress</span>
      <span id="progressPct">73%</span>
    </div>
    <div class="progress-track">
      <div class="progress-fill" id="progressFill"></div>
    </div>
  </div>
</div>

<script>
  // ── Stars ──
  const starsEl = document.getElementById('stars');
  for (let i = 0; i < 120; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    s.style.cssText = `
      left: ${Math.random()*100}%;
      top:  ${Math.random()*60}%;
      animation-duration: ${1.5 + Math.random()*3}s;
      animation-delay:    ${-Math.random()*4}s;
      opacity: ${0.1 + Math.random()*0.5};
    `;
    starsEl.appendChild(s);
  }

  // ── Sparks around chimney area ──
  const sparksEl = document.getElementById('sparks');
  const sparkOrigins = [{x:56,y:68},{x:57,y:69},{x:55,y:70}]; // % positions near chimney
  for (let i = 0; i < 18; i++) {
    const o = sparkOrigins[i % sparkOrigins.length];
    const sp = document.createElement('div');
    sp.className = 'spark';
    sp.style.cssText = `
      left: ${o.x + (Math.random()-0.5)*2}%;
      top:  ${o.y + (Math.random()-0.5)*2}%;
      --dur:   ${0.8 + Math.random()*1.4}s;
      --delay: ${-Math.random()*2}s;
      --tx:    ${(Math.random()-0.5)*40}px;
      --ty:    ${-30 - Math.random()*60}px;
    `;
    sparksEl.appendChild(sp);
  }

  // ── Countdown to 30 days from now ──
  const target = new Date(Date.now() + 30 * 24 * 60 * 60 * 1000);
  function tick() {
    const diff = target - Date.now();
    if (diff <= 0) return;
    const d = Math.floor(diff / 86400000);
    const h = Math.floor((diff % 86400000) / 3600000);
    const m = Math.floor((diff % 3600000)  / 60000);
    const s = Math.floor((diff % 60000)    / 1000);
    document.getElementById('cd-days').textContent = String(d).padStart(2,'0');
    document.getElementById('cd-hrs' ).textContent = String(h).padStart(2,'0');
    document.getElementById('cd-min' ).textContent = String(m).padStart(2,'0');
    document.getElementById('cd-sec' ).textContent = String(s).padStart(2,'0');
  }
  tick();
  setInterval(tick, 1000);

  // ── Progress bar ──
  const pct = 73;
  setTimeout(() => {
    document.getElementById('progressFill').style.width = pct + '%';
  }, 600);

  // ── Form submit ──
  function handleSubmit(e) {
    e.preventDefault();
    document.getElementById('emailInput').value = '';
    const msg = document.getElementById('successMsg');
    msg.style.display = 'block';
    setTimeout(() => { msg.style.display = 'none'; }, 5000);
  }
</script>
</body>
</html>
